# What is the goal of your workflow
# Goal: whenever a chges happen in any python file 
# linter will check format, syntax, indentation is correct or not

name: Auto Linter
on:
  push:
    paths: "*.py"

jobs:
  code-linting:
    runs-on: ubuntu-latest
    steps:
      # This step will automatically clone the code of the current branch into runner
        - name: Checkout/Clone the code
          uses: actions/checkout@v7
      # This step will install python
        - name: set up python
          uses: actions/setup-python@v5
          with:
            python-version: '3.14':
      # this steps will install the linting tool
        - name: Install Linter
          run: pip install ruff
      # this step will run the linter
        - name: Check the files for linting
          run: ruff check .
